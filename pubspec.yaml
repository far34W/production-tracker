name: production_tracker
description: Production Tracking System — all-platform SQLite.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.1

  # ── SQLite — ALL PLATFORMS ─────────────────────────────────
  sqflite: ^2.3.0                 # ← also provides databaseFactory setter
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^0.4.3
  # ──────────────────────────────────────────────────────────

  path: ^1.8.3
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  excel: ^4.0.2
  share_plus: ^7.2.1
  cupertino_icons: ^1.0.2
  flutter_slidable: ^3.0.1
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
